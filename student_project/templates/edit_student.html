<!doctype html>
<html>
  <head>
    <title>Edit Student</title>
    <style>
      body { font-family: Arial, sans-serif; background-color: #f4f6f8; }
      .container { width: 400px; margin: 80px auto; padding: 30px; background-color: white; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); }
      h1 { text-align: center; margin-bottom: 20px; }
      .form-group { margin-bottom: 15px; }
      label { font-weight: bold; display: block; margin-bottom: 5px; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { width: 100%; padding: 10px; background-color: #28a745; border: none; color: white; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
      button:hover { background-color: #1e7e34; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Edit Student</h1>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" />
      </div>
      <div class="form-group">
        <label>Course</label>
        <input type="text" id="course" />
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" />
      </div>

      <button onclick="updateStudent()">Update Student</button>
    </div>

    <script>
      const API_URL = "{{ api_url }}"; // Link provided by your view from .env

      // 1. Fetch current data to pre-fill the form
      async function fetchStudentData() {
        try {
          const response = await fetch(API_URL);
          const student = await response.json();
          
          document.getElementById('name').value = student.name;
          document.getElementById('email').value = student.email;
          document.getElementById('course').value = student.course;
          document.getElementById('age').value = student.age;
        } catch (error) {
          console.error("Error fetching student details:", error);
        }
      }

      // 2. Send PUT request to your backend update_student view
      async function updateStudent() {
        const updatedData = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          course: document.getElementById('course').value,
          age: document.getElementById('age').value
        };

        try {
          const response = await fetch(API_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedData)
          });

          if (response.ok) {
            alert("Student updated successfully!");
            window.location.href = "{% url 'student_list' %}"; // Redirect back to list
          } else {
            alert("Error updating student data.");
          }
        } catch (error) {
          console.error("Update request failed:", error);
        }
      }

      // Load data on page load
      window.onload = fetchStudentData;
    </script>
  </body>
</html>
