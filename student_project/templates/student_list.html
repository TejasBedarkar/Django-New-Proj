<!DOCTYPE html>
<html>
<head>
<title>Student List</title>
</head>

<body>

<h1>Student List</h1>

<a href="/add-student/">Add New Student</a>

<table border="1">

<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Age</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.course }}</td>
<td>{{ student.age }}</td>

<td>

<a href="/edit-student/{{ student.id }}/">Edit</a>

|

<a href="/delete-student/{{ student.id }}/">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
