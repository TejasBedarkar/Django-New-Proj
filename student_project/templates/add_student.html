<!DOCTYPE html>
<html>
  <head>
    <title>Add Student</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
      }
      .container {
        width: 400px;
        margin: 80px auto;
        padding: 30px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }
      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box; /* Ensures padding doesn't affect width */
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        background-color: #0056b3;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #007bff;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Add Student</h1>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" required />
      </div>

      <div class="form-group">
        <label>Course</label>
        <input type="text" id="course" placeholder="Enter course" required />
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="Enter age" required />
      </div>

      <button type="button" onclick="saveStudent()">Save Student</button>
      
      <a href="{% url 'student_list' %}" class="back-link">Back to List</a>
    </div>

    <script>
      async function saveStudent() {
        // Collect data from the input fields
        const studentData = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          course: document.getElementById('course').value,
          age: document.getElementById('age').value
        };

        // Use the dynamic api_url passed from your frontend view
        const API_ENDPOINT = "{{ api_url }}";

        try {
          const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              // Add authorization header if your backend requires a token
              'Authorization': 'Token ' + localStorage.getItem('userToken')
            },
            body: JSON.stringify(studentData)
          });

          if (response.ok) {
            alert("Student added successfully!");
            window.location.href = "{% url 'student_list' %}"; // Redirect back to list
          } else {
            const errorData = await response.json();
            console.error("Server Error:", errorData);
            alert("Failed to save student. Check console for details.");
          }
        } catch (error) {
          console.error("Network Error:", error);
          alert("Could not connect to the backend server.");
        }
      }
    </script>
  </body>
</html>
