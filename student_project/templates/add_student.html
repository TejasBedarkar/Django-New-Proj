<!doctype html>
<html>
  <head>
    <title>Add Student</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
      }

      .container {
        width: 400px;
        margin: 80px auto;
        padding: 30px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      form p {
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Add Student</h1>

      <form method="POST">  
        {% csrf_token %} {{ form.as_p }}

        <button type="submit">Save Student</button>
      </form>
    </div>
  </body>
</html>
